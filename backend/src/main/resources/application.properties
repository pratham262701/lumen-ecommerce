# ---- Server ----
server.port=8080

# ---- Default datasource: H2 in-memory (zero setup) ----
spring.datasource.url=jdbc:h2:mem:ecommerce;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 web console at http://localhost:8080/h2-console (JDBC URL: jdbc:h2:mem:ecommerce)
spring.h2.console.enabled=true

# ---- JPA / Hibernate ----
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ---- JWT ----
# Override these via environment variables in production.
# Secret must be at least 32 chars for HS256.
app.jwt.secret=${JWT_SECRET:change-me-to-a-long-random-secret-value-please-32+}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# ---- Logging ----
logging.level.org.springframework.security=INFO
